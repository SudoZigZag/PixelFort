<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Purple gradient background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#grad)"/>
  
  <!-- Camera icon (simple) -->
  <g transform="translate(128, 128)">
    <!-- Camera body -->
    <rect x="20" y="60" width="216" height="160" rx="20" fill="white" opacity="0.9"/>
    <!-- Lens -->
    <circle cx="128" cy="140" r="50" fill="white" opacity="0.6"/>
    <circle cx="128" cy="140" r="35" fill="#667eea" opacity="0.8"/>
    <!-- Viewfinder -->
    <rect x="70" y="20" width="116" height="40" rx="10" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="60" font-weight="bold" 
        text-anchor="middle" fill="white">PixelFort</text>
</svg>